url: https://dereckscompany.github.io/census/

template:
  bootstrap: 5

navbar:
  structure:
    left: [reference]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/dereckscompany/census
      aria-label: GitHub repository

reference:
  - title: Economic Indicators Time Series (EITS)
    desc: The EITS client and the standalone multi-year backfill.
    contents:
      - CensusEconomicIndicators
      - census_backfill_series
  - title: American Community Survey (ACS)
    desc: The ACS aggregate client, the multi-vintage backfill, and label lookup.
    contents:
      - CensusACS
      - census_backfill_acs
      - census_acs_labels
  - title: Keyless discovery
    desc: Introspect the catalogue and dataset metadata with no API key.
    contents:
      - census_datasets
      - census_variables
      - census_geographies
  - title: Base class and configuration
    desc: The shared transport base, URL getters, key reader, and constants.
    contents:
      - CensusBase
      - census_base_url
      - census_catalogue_url
      - census_api_key
      - EITS_PROGRAMS
      - EITS_GET_VARS
      - SEASONALLY_ADJ
      - ACS_DATASETS
      - CENSUS_MAX_VARIABLES
  - title: Conditions and shapes
    desc: The typed condition family and the documented return shapes.
    contents:
      - census_conditions
      - census_shapes
